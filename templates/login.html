{% extends "base.html" %}
{% block title %}Đăng nhập — Chatbot dạy lập trình C{% endblock %}
{% block body %}
<main class="auth-shell">
    <form id="auth-form" class="auth-card">
        <h1>🤖 Đăng nhập</h1>
        <p class="caption">Học lập trình C cùng chatbot hỗ trợ bằng tiếng Việt</p>
        <div id="auth-error" class="auth-error" hidden></div>
        <label>Tên đăng nhập
            <input name="username" type="text" required autocomplete="username">
        </label>
        <label>Mật khẩu
            <input name="password" type="password" required autocomplete="current-password">
        </label>
        <button type="submit">Đăng nhập</button>
        <p class="auth-switch">Chưa có tài khoản? <a href="/register">Đăng ký</a></p>
    </form>
</main>
{% endblock %}
{% block extra_js %}
<script>const AUTH_ENDPOINT = "/auth/login"; const AUTH_REDIRECT = "/chat";</script>
<script src="/static/js/auth.js"></script>
{% endblock %}
